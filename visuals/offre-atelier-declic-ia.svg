  <path d="M246 257H272M422 257H448" stroke="#7B46E8" stroke-width="3" stroke-linecap="round"/>
  <circle cx="654" cy="386" r="48" fill="#D020CC" opacity="0.12"/>
  <circle cx="654" cy="386" r="30" fill="#D020CC" opacity="0.22"/>
  <text x="654" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#7B46E8">2-3h</text>
