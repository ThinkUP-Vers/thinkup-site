    <g transform="translate(28 121)">
      <circle cx="11" cy="11" r="11" fill="#7B46E8"/><text x="34" y="16" font-size="15" fill="#4A4672">Effort de mise en œuvre</text>
    </g>
    <g transform="translate(28 166)">
