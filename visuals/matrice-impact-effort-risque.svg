<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Matrice impact effort risque</title>
  <desc id="desc">Matrice impact, effort et risque pour sélectionner les premiers cas d'usage IA.</desc>
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#D020CC"/>
      <stop offset="0.5" stop-color="#7B46E8"/>
      <stop offset="1" stop-color="#0096B8"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="#FFFFFF"/>
  <text x="88" y="92" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#18143A">Prioriser sans se disperser</text>
  <text x="88" y="132" font-family="Georgia, serif" font-size="48" fill="#18143A">Impact, effort, risque, ROI</text>
  <g transform="translate(146 188)">
    <rect width="760" height="420" rx="20" fill="#F8F6FF" stroke="#C8BEF0" stroke-width="2"/>
    <line x1="90" y1="350" x2="700" y2="350" stroke="#18143A" stroke-width="2"/>
    <line x1="90" y1="350" x2="90" y2="50" stroke="#18143A" stroke-width="2"/>
    <path d="M700 350 l-12 -7 v14 z" fill="#18143A"/>
    <path d="M90 50 l-7 12 h14 z" fill="#18143A"/>
    <text x="630" y="388" font-family="Consolas, monospace" font-size="12" fill="#81799F">EFFORT</text>
    <text x="30" y="70" font-family="Consolas, monospace" font-size="12" fill="#81799F" transform="rotate(-90 30 70)">IMPACT</text>
    <rect x="112" y="74" width="272" height="144" rx="16" fill="#FFFFFF" stroke="#7B46E8" stroke-width="2"/>
    <text x="136" y="112" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#18143A">À lancer d'abord</text>
    <text x="136" y="146" font-family="Arial, sans-serif" font-size="14" fill="#4A4672">Rapprochement de données</text>
    <text x="136" y="172" font-family="Arial, sans-serif" font-size="14" fill="#4A4672">Synthèses commerciales</text>
    <rect x="418" y="74" width="244" height="144" rx="16" fill="#FFFFFF" stroke="#E5E1F5"/>
    <text x="442" y="112" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#18143A">À cadrer</text>
    <text x="442" y="146" font-family="Arial, sans-serif" font-size="14" fill="#4A4672">Support interne augmenté</text>
    <text x="442" y="172" font-family="Arial, sans-serif" font-size="14" fill="#4A4672">Connexion documentaire</text>
    <rect x="112" y="246" width="272" height="84" rx="16" fill="#FFFFFF" stroke="#E5E1F5"/>
    <text x="136" y="280" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#18143A">À automatiser plus tard</text>
    <text x="136" y="307" font-family="Arial, sans-serif" font-size="14" fill="#4A4672">Tâches rares ou peu coûteuses</text>
    <rect x="418" y="246" width="244" height="84" rx="16" fill="#FFFFFF" stroke="#D020CC" stroke-width="2"/>
    <text x="442" y="280" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#18143A">À éviter</text>
    <text x="442" y="307" font-family="Arial, sans-serif" font-size="14" fill="#4A4672">Risque élevé, ROI flou</text>
  </g>
  <g transform="translate(940 236)" font-family="Arial, sans-serif">
    <rect width="70" height="260" rx="35" fill="#F8F6FF" stroke="#C8BEF0" stroke-width="2"/>
    <circle cx="35" cy="55" r="18" fill="#D020CC"/>
    <circle cx="35" cy="130" r="18" fill="#7B46E8"/>
    <circle cx="35" cy="205" r="18" fill="#0096B8"/>
    <text x="98" y="61" font-size="14" fill="#4A4672">Risque</text>
    <text x="98" y="136" font-size="14" fill="#4A4672">ROI</text>
    <text x="98" y="211" font-size="14" fill="#4A4672">Adoption</text>
  </g>
</svg>
