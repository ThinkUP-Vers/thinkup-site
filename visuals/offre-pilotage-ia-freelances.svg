  <rect width="800" height="540" rx="24" fill="#FFF8FF"/>
  <rect x="58" y="58" width="684" height="424" rx="22" fill="#FFFFFF" stroke="#E5E1F5" stroke-width="2"/>
  <text x="92" y="112" font-family="Consolas, monospace" font-size="13" letter-spacing="2" fill="#D020CC">PILOTAGE IA</text>
  <text x="92" y="164" font-family="Georgia, serif" font-size="48" fill="#18143A">Passer du pilote au ROI</text>
  <g transform="translate(108 232)" font-family="Arial, sans-serif">
