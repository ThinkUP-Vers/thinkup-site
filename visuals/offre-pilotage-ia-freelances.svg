    <g><circle cx="180" cy="54" r="20" fill="#7B46E8"/><text x="136" y="112" font-size="14" fill="#4A4672">Build</text></g>
    <g><circle cx="360" cy="54" r="20" fill="#0096B8"/><text x="318" y="112" font-size="14" fill="#4A4672">Adoption</text></g>
    <g><circle cx="560" cy="54" r="26" fill="#18143A"/><text x="524" y="112" font-size="14" fill="#4A4672">Mesure</text><text x="560" y="61" font-size="19" font-weight="700" text-anchor="middle" fill="#FFFFFF">ROI</text></g>
  </g>
  <g transform="translate(116 390)" font-family="Arial, sans-serif">
